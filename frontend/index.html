<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LookSphere</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="description"
      content="Welcome to LookSphere - a secure social hub to share your life in photos and videos."
    />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://looksphere.com/" />
    <meta property="og:title" content="LookSphere" />
    <meta property="og:description" content="Welcome to LookSphere - a secure social hub to share your life in photos and videos." />
    <meta property="og:image" content="/favicon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://looksphere.com/" />
    <meta property="twitter:title" content="LookSphere" />
    <meta property="twitter:description" content="Welcome to LookSphere - a secure social hub to share your life in photos and videos." />
    <meta property="twitter:image" content="/favicon.png" />
    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Cloudinary Media Preconnect -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      Theme flash prevention.
      Runs synchronously before React mounts so the correct .dark class is on
      <html> before the first paint — eliminates flash of wrong theme.
      Default: dark mode (matches the original design).
    -->
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        if (stored === "light") {
          document.documentElement.classList.remove("dark");
        } else {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
